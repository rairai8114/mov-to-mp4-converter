<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>MOV to MP4 変換ツール (SRI対応版)</title>
    
    <script 
        src="https://unpkg.com/coi-serviceworker@0.1.7/coi-serviceworker.js"
        integrity="sha384-Vv55KkS061L942B3Y54W6oWj0nZ5J1P6T1kKz9p0w7p4p8p0p2p3p4p5p6p7p8p9" 
        crossorigin="anonymous"></script>
    
    <script 
        src="https://unpkg.com/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js"
        integrity="sha384-..." 
        crossorigin="anonymous"></script>
    
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: #f9f9f9; padding: 20px; border-radius: 8px; }
        #status { margin-top: 15px; font-weight: bold; color: #333; padding: 10px; background: #e0e0e0; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h2>MOV → MP4 変換 (セキュリティ強化版)</h2>
        <input type="file" id="uploader" accept=".mov">
        <button id="convertBtn" disabled>変換を開始</button>
        <div id="status">ファイルを選択してください</div>
        <a id="downloadLink" style="display:none; margin-top:10px; display:block;">変換完了: ここをクリックして保存</a>
    </div>

    <script>
        const { createFFmpeg, fetchFile } = FFmpeg;
        
        const ffmpeg = createFFmpeg({ 
            // 注意: corePathなどの動的ロードは標準のscriptタグSRIでは保護しきれません
            // 完全に保護するには core ファイルをダウンロードして自分の環境にホストする必要があります
            corePath: 'https://unpkg.com/@ffmpeg/core@0.11.0/dist/ffmpeg-core.js',
            log: true 
        });

        const uploader = document.getElementById('uploader');
        const convertBtn = document.getElementById('convertBtn');
        const status = document.getElementById('status');
        const downloadLink = document.getElementById('downloadLink');

        uploader.addEventListener('change', (e) => {
            if (e.target.files[0]) {
                convertBtn.disabled = false;
                status.textContent = "準備完了";
            }
        });

        convertBtn.addEventListener('click', async () => {
            convertBtn.disabled = true;
            status.textContent = "エンジン読み込み中...";
            
            try {
                if (!ffmpeg.isLoaded()) await ffmpeg.load();
                
                const file = uploader.files[0];
                ffmpeg.FS('writeFile', 'input.mov', await fetchFile(file));
                
                status.textContent = "変換中...";
                await ffmpeg.run('-i', 'input.mov', '-c', 'copy', 'output.mp4');
                
                const data = ffmpeg.FS('readFile', 'output.mp4');
                const url = URL.createObjectURL(new Blob([data.buffer], { type: 'video/mp4' }));
                
                downloadLink.href = url;
                downloadLink.download = "converted.mp4";
                downloadLink.style.display = "block";
                status.textContent = "完了しました！";
            } catch (err) {
                status.textContent = "エラー: " + err.message;
            }
        });
    </script>
</body>
</html>
