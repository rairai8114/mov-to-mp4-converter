<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>MOV to MP4 無劣化コンバーター (GitHub Pages版)</title>
    
    <script src="coi-serviceworker.js"></script>
    
    <script src="ffmpeg.min.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; }
        .container { max-width: 600px; margin: 0 auto; background: #f9f9f9; padding: 20px; border-radius: 8px; }
        #status { margin-top: 15px; font-weight: bold; color: #333; padding: 10px; background: #e0e0e0; border-radius: 4px;}
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; margin-top: 10px; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        #downloadLink { display: inline-block; margin-top: 15px; padding: 10px 20px; background: #007BFF; color: white; text-decoration: none; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>MOV &rarr; MP4 (画質劣化なし - ブラウザ内完結)</h2>
        <p>※動画はサーバーにアップロードされず、あなたのブラウザ内だけで安全に変換されます。</p>
        
        <input type="file" id="uploader" accept=".mov"><br>
        <button id="convertBtn" disabled>変換を開始</button>
        
        <div id="status">ステータス: ファイルを選択してください</div>
        <a id="downloadLink" style="display:none;">ダウンロード</a>
    </div>

    <script>
        const { createFFmpeg, fetchFile } = FFmpeg;
        
        const ffmpeg = createFFmpeg({ 
            corePath: './ffmpeg-core.js',
            log: true 
        });

        const uploader = document.getElementById('uploader');
        const convertBtn = document.getElementById('convertBtn');
        const status = document.getElementById('status');
        const downloadLink = document.getElementById('downloadLink');

        let videoFile = null;

        uploader.addEventListener('change', (e) => {
            videoFile = e.target.files[0];
            if (videoFile) {
                convertBtn.disabled = false;
                status.textContent = `ステータス: 準備完了 (${videoFile.name})`;
                downloadLink.style.display = 'none';
            }
        });

        convertBtn.addEventListener('click', async () => {
            if (!videoFile) return;

            convertBtn.disabled = true;
            status.textContent = "ステータス: エンジン初期化中...";

            try {
                if (!ffmpeg.isLoaded()) {
                    await ffmpeg.load();
                }

                status.textContent = "ステータス: 変換中（再エンコードなしのため高速です）...";

                const inputName = 'input.mov';
                const outputName = 'output.mp4';

                ffmpeg.FS('writeFile', inputName, await fetchFile(videoFile));

                // 映像・音声を再エンコードせずにそのままMP4コンテナにコピー
                await ffmpeg.run('-i', inputName, '-c', 'copy', outputName);

                const data = ffmpeg.FS('readFile', outputName);

                const videoBlob = new Blob([data.buffer], { type: 'video/mp4' });
                const url = URL.createObjectURL(videoBlob);

                downloadLink.href = url;
                downloadLink.download = videoFile.name.replace(/\.[^/.]+$/, "") + ".mp4";
                downloadLink.textContent = "変換完了: ここをクリックして保存";
                downloadLink.style.display = 'inline-block';

                status.textContent = "ステータス: 処理が完了しました。";
            } catch (error) {
                console.error(error);
                status.textContent = "ステータス: エラーが発生しました。ブラウザの検証コンソールを確認してください。";
            } finally {
                convertBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
