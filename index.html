<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>MOV to MP4 一括変換ツール</title>

    <script 
        src="https://unpkg.com/coi-serviceworker@0.1.7/coi-serviceworker.js"
        integrity="sha384-JBKAA5TOLI44P/eKb90fF6D+AsZofG8H8QGJqi2AjShGOZElr9XrG+N+msyYDA5v" 
        crossorigin="anonymous"></script>
    
    <script 
        src="https://unpkg.com/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js"
        integrity="sha384-m5or9sW5FUT2WQbj3UthGceVpwo9zSgHKdCugYKHl19lyXPvwO/oQcmq8Fw0FfaA" 
        crossorigin="anonymous"></script>
    
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; }
        .container { max-width: 600px; margin: 0 auto; background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        button { padding: 10px 20px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 4px; }
        #status { margin-top: 15px; padding: 10px; background: #eee; border-radius: 4px; }
        .download-item { margin-top: 10px; display: block; color: #007bff; }
    </style>
</head>
<body>
    <div class="container">
        <h2>MOV → MP4 一括変換</h2>
        <input type="file" id="uploader" accept=".mov" multiple>
        <button id="convertBtn" disabled>変換を開始</button>
        <div id="status">ファイルを選択してください</div>
        <div id="downloadList"></div>
    </div>

    <script>
        const { createFFmpeg, fetchFile } = FFmpeg;
        const ffmpeg = createFFmpeg({ 
            corePath: 'https://unpkg.com/@ffmpeg/core@0.11.0/dist/ffmpeg-core.js',
            log: true 
        });

        const uploader = document.getElementById('uploader');
        const convertBtn = document.getElementById('convertBtn');
        const status = document.getElementById('status');
        const downloadList = document.getElementById('downloadList');

        uploader.addEventListener('change', () => {
            if (uploader.files.length > 0) {
                convertBtn.disabled = false;
                status.textContent = `${uploader.files.length} 個のファイルが選択されています。`;
                downloadList.innerHTML = '';
            }
        });

        convertBtn.addEventListener('click', async () => {
            convertBtn.disabled = true;
            downloadList.innerHTML = '';
            
            if (!ffmpeg.isLoaded()) {
                status.textContent = "エンジン読み込み中...";
                await ffmpeg.load();
            }

            // ファイルを順番に変換
            for (let i = 0; i < uploader.files.length; i++) {
                const file = uploader.files[i];
                status.textContent = `変換中: ${file.name} (${i + 1}/${uploader.files.length})`;

                try {
                    const inputName = `input_${i}.mov`;
                    const outputName = `output_${i}.mp4`;

                    ffmpeg.FS('writeFile', inputName, await fetchFile(file));
                    await ffmpeg.run('-i', inputName, '-c', 'copy', outputName);
                    
                    const data = ffmpeg.FS('readFile', outputName);
                    const url = URL.createObjectURL(new Blob([data.buffer], { type: 'video/mp4' }));
                    
                    // ダウンロードリンクを生成してリストに追加
                    const link = document.createElement('a');
                    link.href = url;
                    link.download = file.name.replace(/\.[^/.]+$/, "") + ".mp4";
                    link.textContent = `完了: ${link.download}`;
                    link.className = 'download-item';
                    downloadList.appendChild(link);

                    // 後片付け
                    ffmpeg.FS('unlink', inputName);
                    ffmpeg.FS('unlink', outputName);
                } catch (err) {
                    const errorMsg = document.createElement('div');
                    errorMsg.textContent = `エラー: ${file.name} - ${err.message}`;
                    downloadList.appendChild(errorMsg);
                }
            }
            status.textContent = "すべての処理が完了しました。";
            convertBtn.disabled = false;
        });
    </script>
</body>
</html>
