<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOV to MP4 変換ツール</title>

    <script 
        src="https://unpkg.com/coi-serviceworker@0.1.7/coi-serviceworker.js"
        crossorigin="anonymous"></script>
    
    <script 
    src="https://unpkg.com/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js"
    integrity="sha384-m5or9sW5FUT2WQbj3UthGceVpwo9zSgHKdCugYKHl19lyXPvwO/oQcmq8Fw0FfaA" 
    crossorigin="anonymous"></script>
    
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; padding: 20px; line-height: 1.6; }
        .container { max-width: 600px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { color: #333; margin-top: 0; }
        #status { margin-top: 20px; font-weight: bold; color: #555; padding: 15px; background: #f0f0f0; border-radius: 6px; }
        button { padding: 12px 24px; font-size: 16px; cursor: pointer; background-color: #007bff; color: white; border: none; border-radius: 6px; margin-top: 10px; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
        #downloadLink { display:none; margin-top:20px; font-weight:bold; color: #007bff; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <h2>MOV → MP4 変換</h2>
        <p>動画を選択してください（変換はブラウザ内で完結します）</p>
        <input type="file" id="uploader" accept=".mov">
        <br>
        <button id="convertBtn" disabled>変換を開始</button>
        <div id="status">ファイルを選択してください</div>
        <a id="downloadLink">変換完了: ここをクリックして保存</a>
    </div>

    <script>
        const { createFFmpeg, fetchFile } = FFmpeg;
        
        // ffmpegの初期化
        const ffmpeg = createFFmpeg({ 
            corePath: 'https://unpkg.com/@ffmpeg/core@0.11.0/dist/ffmpeg-core.js',
            log: true 
        });

        const uploader = document.getElementById('uploader');
        const convertBtn = document.getElementById('convertBtn');
        const status = document.getElementById('status');
        const downloadLink = document.getElementById('downloadLink');

        uploader.addEventListener('change', (e) => {
            if (e.target.files[0]) {
                convertBtn.disabled = false;
                status.textContent = "準備完了: 変換ボタンを押してください";
            }
        });

        convertBtn.addEventListener('click', async () => {
            convertBtn.disabled = true;
            status.textContent = "エンジン読み込み中...（数秒かかります）";
            
            try {
                if (!ffmpeg.isLoaded()) await ffmpeg.load();
                
                const file = uploader.files[0];
                ffmpeg.FS('writeFile', 'input.mov', await fetchFile(file));
                
                status.textContent = "変換中...";
                await ffmpeg.run('-i', 'input.mov', '-c', 'copy', 'output.mp4');
                
                const data = ffmpeg.FS('readFile', 'output.mp4');
                const url = URL.createObjectURL(new Blob([data.buffer], { type: 'video/mp4' }));
                
                // ファイル名保持ロジック
                const originalName = file.name;
                const newName = originalName.replace(/\.[^/.]+$/, "") + ".mp4";
                
                downloadLink.href = url;
                downloadLink.download = newName;
                downloadLink.style.display = "block";
                status.textContent = "変換完了！";
            } catch (err) {
                status.textContent = "エラー: " + err.message;
                console.error(err);
            } finally {
                convertBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
